services:
  postgres:
    image: postgres:17
    container_name: repolens-postgres

    environment:
      POSTGRES_DB: repolens
      POSTGRES_USER: repolens
      POSTGRES_PASSWORD: repolens

    ports:
      - "5432:5432"

    volumes:
      - repolens-postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repolens -d repolens"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  repolens-postgres-data: